<!DOCTYPE html>
<html lang="ky">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Афиша категориялары — Баткен Portal</title>
<style>
  :root{--or:#DB2777;--or-l:#FCE7F3;--bg:#F8FAFC;--card:#fff;--text:#1E293B;--muted:#64748B;--border:#E2E8F0;}
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Inter',system-ui,sans-serif;background:var(--bg);color:var(--text);padding:20px;max-width:680px;margin:0 auto}
  h1{font-size:1.25rem;margin-bottom:4px}
  .sub{color:var(--muted);font-size:.85rem;margin-bottom:20px}
  .card{background:var(--card);border-radius:14px;box-shadow:0 2px 16px rgba(0,0,0,.08);padding:18px;margin-bottom:16px}
  .btn{width:100%;background:var(--or);color:#fff;border:none;padding:13px;border-radius:11px;font-weight:700;font-size:.9rem;cursor:pointer;margin-bottom:8px}
  .btn:disabled{opacity:.5;cursor:not-allowed}
  .pill{display:inline-block;background:var(--or-l);color:var(--or);font-size:.72rem;font-weight:700;padding:3px 9px;border-radius:20px;margin-bottom:10px}
  .cat-row{border:1px solid var(--border);border-radius:10px;padding:10px 12px;margin-bottom:8px}
  .cat-row-h{display:flex;align-items:center;gap:8px;font-weight:700;font-size:.9rem;margin-bottom:4px}
  .cat-row-sub{font-size:.78rem;color:var(--muted);line-height:1.5}
  #log{background:#0F172A;color:#A7F3D0;font-family:monospace;font-size:.78rem;border-radius:10px;padding:12px;max-height:260px;overflow-y:auto;white-space:pre-wrap;display:none}
</style>
</head>
<body>

<h1>🎭 Афиша категорияларын жүктөө</h1>
<div class="sub">Баткен Portal — иш-чара категориялары (Firestore: <code>categories_events</code>)</div>

<div class="card">
  <span class="pill">Аракет</span>
  <button class="btn" id="seed-btn" onclick="seedCategories()">📥 Категорияларды жазуу / жаңылоо</button>
  <div id="log"></div>
</div>

<div class="card">
  <span class="pill" style="background:#DCFCE7;color:#15803D">Алдын ала көрүү</span>
  <div id="preview"></div>
</div>

<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import { getFirestore, doc, setDoc } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';

const firebaseConfig = {
  apiKey: "AIzaSyAfUm1YzNbRxzOYclFhr1v1g-xSo6MkN_o",
  authDomain: "batken-portal.firebaseapp.com",
  projectId: "batken-portal",
  storageBucket: "batken-portal.firebasestorage.app",
  messagingSenderId: "705755102053",
  appId: "1:705755102053:web:8ce35ad4fffb68ff4c7f8c"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const CATEGORIES = [
  { id: 'kino', name: 'Кино', emoji: '🎬', order: 1, subcategories: [] },
  { id: 'concert', name: 'Концерт', emoji: '🎤', order: 2, subcategories: [] },
  { id: 'theatre', name: 'Театр', emoji: '🎭', order: 3, subcategories: [] },
  { id: 'sport', name: 'Спорттук иш-чаралар', emoji: '⚽', order: 4, subcategories: [] },
  { id: 'festival', name: 'Көргөзмө / Фестиваль', emoji: '🎪', order: 5, subcategories: [] },
  { id: 'other', name: 'Башка', emoji: '📌', order: 6, subcategories: [] }
];

document.getElementById('preview').innerHTML = CATEGORIES.map(c => `
  <div class="cat-row">
    <div class="cat-row-h"><span>${c.emoji}</span><span>${c.name}</span></div>
  </div>
`).join('');

const logEl = document.getElementById('log');
function log(msg) {
  logEl.style.display = 'block';
  logEl.textContent += msg + '\n';
  logEl.scrollTop = logEl.scrollHeight;
}

window.seedCategories = async () => {
  const btn = document.getElementById('seed-btn');
  btn.disabled = true; btn.textContent = 'Жазылууда...';
  log('▶ Жазуу башталды...');
  let ok = 0, fail = 0;
  for (const cat of CATEGORIES) {
    try {
      await setDoc(doc(db, 'categories_events', cat.id), {
        name: cat.name, emoji: cat.emoji, order: cat.order, subcategories: cat.subcategories
      });
      log(`  ✅ ${cat.emoji} ${cat.name}`);
      ok++;
    } catch(e) {
      log(`  ❌ ${cat.name}: ${e.message}`);
      fail++;
    }
  }
  log(`▶ Бүттү. Ийгиликтүү: ${ok}, ката: ${fail}`);
  btn.disabled = false; btn.textContent = '📥 Категорияларды жазуу / жаңылоо';
};
</script>
</body>
</html>
